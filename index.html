<!DOCTYPE html>
<html>

<head>
    <title>AI Support Chat</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        #chat {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        .msg {
            margin: 10px 0;
        }

        .user {
            text-align: right;
            color: blue;
        }

        .bot {
            text-align: left;
            color: green;
        }
    </style>
</head>

<body>

    <div id="chat">
        <h3>🤖 Customer Support</h3>
        <div id="messages"></div>

        <input id="input" placeholder="Type message..." style="width:80%">
        <button onclick="send()">Send</button>
    </div>

    <script>
        async function send() {
            let input = document.getElementById("input");
            let msg = input.value;

            document.getElementById("messages").innerHTML += `<div class="msg user">${msg}</div>`;

            let res = await fetch("http://127.0.0.1:8000/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });

            let data = await res.json();

            document.getElementById("messages").innerHTML += `<div class="msg bot">${data.reply}</div>`;

            input.value = "";
        }
    </script>

</body>

</html>
